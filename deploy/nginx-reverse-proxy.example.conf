# Add this location block to your existing Nginx server that serves
# https://musicque.politetech.com (same SSL, same domain).
#
# The lunch-vote-mf container listens on port 80 internally; from the host
# it is exposed as 5806 (see docker-compose). Adjust proxy_pass if your
# lunch-vote-mf is reached via different host/port (e.g. same Docker network).

location /lunch-vote-mf/ {
    proxy_pass http://127.0.0.1:5806/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /poliboard-mf/ {
    proxy_pass http://127.0.0.1:5807/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
