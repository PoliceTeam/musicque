<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polite Order</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script type="module">
      // Lấy key từ biến môi trường
      const key = 'wN1XcQ74'

      // Tạo và inject script
      const script = document.createElement('script')
      script.src = `https://code.responsivevoice.org/responsivevoice.js?key=${key}`
      script.onload = () => {
        console.log('[MusicPlayer][Speech] responsiveVoice script loaded', {
          src: script.src,
          hasResponsiveVoice: Boolean(window.responsiveVoice),
          hasSpeak: typeof window.responsiveVoice?.speak === 'function',
          timestamp: new Date().toISOString(),
        })
      }
      script.onerror = (error) => {
        console.error('[MusicPlayer][Speech] responsiveVoice script failed', {
          src: script.src,
          error,
          timestamp: new Date().toISOString(),
        })
      }
      document.body.appendChild(script)
      console.log('[MusicPlayer][Speech] responsiveVoice script appended', {
        src: script.src,
        timestamp: new Date().toISOString(),
      })
    </script>
  </body>
</html>
