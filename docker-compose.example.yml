version: '3.8'

services:
  mongodb:
    build:
      context: ./mongodb
      dockerfile: Dockerfile
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/music-order-app
      - JWT_SECRET=your_jwt_secret
      - ADMIN_USERNAME=your_admin_username
      - ADMIN_PASSWORD=your_admin_password
      - CLIENT_URL=your_client_url
      - SOCKET_URL=your_socket_url
      - YOUTUBE_API_KEY=your_youtube_api_key
      - BTC_API_KEY=your_btc_api_key
      - WC2026_API_KEY=your_wc2026_api_key
      - WEATHER_API_KEY=
      - WEATHER_LOCATION=
      - VIENEU_TTS_URL=http://vieneu-tts:8100
      - VIENEU_TTS_VOICE=Ngọc Lan
      - VIENEU_TTS_CACHE_VERSION=vieneu-preset-v1
      - VIENEU_TTS_ENABLED=true
      - VIENEU_TTS_TIMEOUT=30000
      - VIENEU_TTS_HEALTH_TIMEOUT=5000
      - VIENEU_TTS_CACHE_MAX_FILES=200
      - VIENEU_TTS_CACHE_MAX_AGE_DAYS=7
      - VIENEU_TTS_WARM_QUEUE_CONCURRENCY=1
      - VIENEU_TTS_RATE_MAX_REQUESTS=20
      - VIENEU_TTS_RATE_WINDOW_MS=60000
    ports:
      - '5800:5000'

  vieneu-tts:
    build:
      context: ./tts-service
      dockerfile: Dockerfile
    environment:
      - VIENEU_HOST=0.0.0.0
      - VIENEU_PORT=8100
      - VIENEU_APPLY_WATERMARK=false
      - VIENEU_INFER_MAX_CHARS=220
      - VIENEU_INFER_TEMPERATURE=0.75
      - VIENEU_INFER_TOP_K=20
      - VIENEU_INFER_TOP_P=0.92
      - VIENEU_INFER_REPETITION_PENALTY=1.15
    ports:
      - '8100:8100'
    volumes:
      - tts_models:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  lunch-vote-mf:
    build:
      context: ./lunch-vote-mf
      dockerfile: Dockerfile
    ports:
      - '5806:80'

  poliboard:
    build:
      context: ./poliboard
      dockerfile: Dockerfile
    ports:
      - '5807:80'

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=your_api_url
        - VITE_SOCKET_URL=your_socket_url
        - VITE_LUNCH_VOTE_REMOTE_URL=your_lunch_vote_remote_url
        - VITE_POLIBOARD_REMOTE_URL=your_poliboard_remote_url
    ports:
      - '3800:80'

networks:
  music-order-network:
    driver: bridge

volumes:
  mongodb_data:
  tts_models:
